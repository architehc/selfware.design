<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0c0f08">
<title>Try Selfware — selfware.design</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦊</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/vendor/xterm.min.css">
<script src="/vendor/xterm.min.js"></script>
<script src="/vendor/addon-fit.min.js"></script>
<script src="/vendor/addon-web-links.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0c0f08;color:#e8e0d0;font-family:'DM Mono',monospace;overflow:hidden}

/* ─── Header ─── */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid rgba(212,163,115,0.1);background:rgba(12,15,8,0.95);position:relative;z-index:10;height:49px}
.header a{color:#D4A373;text-decoration:none;font-size:13px;letter-spacing:0.06em}
.header a:hover{color:#e8e0d0}
.logo{font-family:'Instrument Serif',Georgia,serif;font-size:18px;color:#e8e0d0;text-decoration:none!important}
.logo:hover{color:#D4A373!important}
.status-bar{display:flex;align-items:center;gap:16px;font-size:11px;color:#908878;letter-spacing:0.06em}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
.status-dot.green{background:#606C38}
.status-dot.yellow{background:#D4A373}
.status-dot.red{background:#a33}
.timer{color:#D4A373;font-variant-numeric:tabular-nums}

/* ─── Auth Screen ─── */
.auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100vh - 49px);padding:24px;text-align:center}
.auth-title{font-family:'Instrument Serif',Georgia,serif;font-size:36px;color:#e8e0d0;margin-bottom:8px}
.auth-sub{font-size:13px;color:#908878;margin-bottom:32px;max-width:420px;line-height:1.6}
.auth-form{display:flex;gap:8px;margin-bottom:16px}
.auth-form input{background:rgba(232,224,208,0.06);border:1px solid rgba(212,163,115,0.2);border-radius:8px;padding:10px 16px;color:#e8e0d0;font-family:'DM Mono',monospace;font-size:13px;width:260px;outline:none;transition:border-color 0.2s}
.auth-form input:focus{border-color:rgba(212,163,115,0.5)}
.auth-form input::placeholder{color:#6e6e5a}
.auth-form button{background:#606C38;color:#fefae0;border:none;border-radius:8px;padding:10px 24px;font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;letter-spacing:0.04em;transition:background 0.2s}
.auth-form button:hover{background:#6e7d3e}
.auth-form button:disabled{opacity:0.5;cursor:not-allowed}
.auth-error{color:#c44;font-size:11px;height:16px;margin-top:4px}
.auth-note{font-size:10px;color:#6e6e5a;margin-top:24px;max-width:360px;line-height:1.6}

/* ─── Showcase Carousel ─── */
.showcase{margin-top:32px;max-width:560px;width:100%}
.showcase-title{font-size:11px;color:#908878;letter-spacing:0.1em;margin-bottom:12px}
.showcase-cards{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.showcase-cards::-webkit-scrollbar{display:none}
.showcase-card{flex:0 0 170px;background:rgba(232,224,208,0.04);border:1px solid rgba(212,163,115,0.1);border-radius:8px;padding:12px;text-align:left;transition:border-color 0.2s}
.showcase-card:hover{border-color:rgba(212,163,115,0.3)}
.showcase-card .sc-icon{font-size:20px;margin-bottom:6px}
.showcase-card .sc-label{font-size:11px;color:#D4A373;margin-bottom:4px}
.showcase-card .sc-desc{font-size:10px;color:#6e6e5a;line-height:1.5}

/* ─── Queue Screen ─── */
.queue-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100vh - 49px);text-align:center}
.queue-pos{font-size:64px;color:#D4A373;font-family:'Instrument Serif',Georgia,serif}
.queue-label{font-size:13px;color:#908878;letter-spacing:0.08em;margin-top:8px}
.queue-info{font-size:11px;color:#6e6e5a;margin-top:24px}

/* ─── Main Workspace (split-pane) ─── */
.workspace{display:flex;height:calc(100vh - 49px - 42px);position:relative}

/* Terminal pane */
.terminal-pane{flex:1;min-width:0;padding:4px;position:relative}
.terminal-pane .xterm{height:100%}
.xterm-viewport::-webkit-scrollbar{width:6px}
.xterm-viewport::-webkit-scrollbar-track{background:transparent}
.xterm-viewport::-webkit-scrollbar-thumb{background:rgba(212,163,115,0.2);border-radius:3px}

/* Visual panel */
.visual-panel{width:30%;min-width:240px;max-width:380px;border-left:1px solid rgba(212,163,115,0.1);display:flex;flex-direction:column;overflow:hidden;background:rgba(12,15,8,0.6)}

/* Activity feed */
.panel-section{padding:10px 12px;border-bottom:1px solid rgba(212,163,115,0.06)}
.panel-section-title{font-size:9px;color:#908878;letter-spacing:0.12em;margin-bottom:6px;text-transform:uppercase}
.activity-feed{max-height:200px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(212,163,115,0.2) transparent}
.activity-feed::-webkit-scrollbar{width:4px}
.activity-feed::-webkit-scrollbar-thumb{background:rgba(212,163,115,0.15);border-radius:2px}
.activity-item{display:flex;align-items:flex-start;gap:6px;padding:3px 0;font-size:10px;color:#a09880;animation:fadeSlide 0.3s ease-out}
.activity-item .ai-icon{flex-shrink:0;width:14px;text-align:center;font-size:11px}
.activity-item .ai-text{line-height:1.4;word-break:break-word}
.activity-item.success .ai-icon{color:#606C38}
.activity-item.error .ai-icon{color:#c44}
.activity-item.info .ai-icon{color:#D4A373}
.activity-item.thinking .ai-icon{color:#5a7a9a}

@keyframes fadeSlide{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* Screenshot gallery */
.gallery{display:flex;flex-wrap:wrap;gap:6px}
.gallery-thumb{width:72px;height:48px;border-radius:4px;border:1px solid rgba(212,163,115,0.15);cursor:pointer;object-fit:cover;transition:border-color 0.2s;animation:fadeIn 0.3s ease-out}
.gallery-thumb:hover{border-color:rgba(212,163,115,0.5)}
@keyframes fadeIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.stat-item{background:rgba(232,224,208,0.03);border-radius:4px;padding:6px 8px;text-align:center}
.stat-val{font-size:16px;color:#D4A373;font-variant-numeric:tabular-nums}
.stat-label{font-size:8px;color:#908878;letter-spacing:0.08em;margin-top:2px}

/* ─── Demo Tabs ─── */
.demo-tabs{display:flex;height:42px;border-top:1px solid rgba(212,163,115,0.1);background:rgba(12,15,8,0.95);align-items:center;padding:0 8px;gap:4px;flex-shrink:0}
.demo-tab{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;font-size:11px;color:#908878;cursor:pointer;transition:all 0.2s;border:1px solid transparent;letter-spacing:0.02em;white-space:nowrap}
.demo-tab:hover{color:#e8e0d0;background:rgba(232,224,208,0.04)}
.demo-tab.active{color:#D4A373;background:rgba(212,163,115,0.08);border-color:rgba(212,163,115,0.2)}
.demo-tab .dt-num{font-weight:500;color:#D4A373;opacity:0.6}
.demo-tab.active .dt-num{opacity:1}

/* ─── Lightbox ─── */
.lightbox{position:fixed;inset:0;background:rgba(12,15,8,0.92);display:flex;align-items:center;justify-content:center;z-index:200;cursor:pointer;animation:fadeIn 0.2s}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;border:1px solid rgba(212,163,115,0.2)}

/* ─── Ended Overlay ─── */
.ended-overlay{position:fixed;inset:0;background:rgba(12,15,8,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center}
.ended-overlay h2{font-family:'Instrument Serif',Georgia,serif;font-size:28px;color:#e8e0d0;margin-bottom:8px}
.ended-overlay p{font-size:13px;color:#908878;margin-bottom:24px}
.ended-overlay a{color:#D4A373;text-decoration:none;font-size:13px;border:1px solid rgba(212,163,115,0.3);border-radius:8px;padding:10px 24px;transition:background 0.2s}
.ended-overlay a:hover{background:rgba(212,163,115,0.08)}

/* ─── Loading ─── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100vh - 49px)}
.spinner{width:24px;height:24px;border:2px solid rgba(212,163,115,0.2);border-top-color:#D4A373;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:12px;color:#908878;margin-top:12px;letter-spacing:0.06em}

/* ─── Responsive ─── */
@media(max-width:768px){
  .workspace{flex-direction:column}
  .terminal-pane{flex:1;min-height:50vh}
  .visual-panel{width:100%;max-width:none;min-width:0;border-left:none;border-top:1px solid rgba(212,163,115,0.1);max-height:40vh;overflow-y:auto}
  .demo-tabs{overflow-x:auto;scrollbar-width:none}
  .demo-tabs::-webkit-scrollbar{display:none}
  .auth-form{flex-direction:column;align-items:center}
  .auth-form input{width:100%;max-width:280px}
  .auth-title{font-size:28px}
  .header{padding:10px 16px}
  .showcase-cards{flex-wrap:nowrap}
}
</style>
</head>
<body>

<div class="header">
  <a href="/" class="logo">selfware</a>
  <div class="status-bar" id="status-bar">
    <span id="session-status"></span>
    <span id="timer" class="timer"></span>
  </div>
  <a href="/">← Back</a>
</div>

<div id="app"></div>

<script>
(function() {
  const $ = (id) => document.getElementById(id);
  const app = $("app");
  const statusBar = $("session-status");
  const timerEl = $("timer");

  let state = "auth"; // auth | loading | queue | terminal | ended
  let token = null;
  let ws = null;
  let term = null;
  let fitAddon = null;
  let sessionStart = null;
  let timerInterval = null;
  let activeDemo = "demo-1-bugs";
  const SESSION_MAX = 15 * 60; // seconds

  // ─── Activity feed state ──────────────────────────────────
  const activityItems = [];
  const screenshots = [];
  let stepCount = 0;
  let filesChanged = 0;
  let testsPassed = 0;

  // ─── Demo definitions ────────────────────────────────────
  const DEMOS = [
    { id: "demo-1-bugs", num: 1, name: "Bugs", desc: "Fix 3 bugs in weather CLI" },
    { id: "demo-2-security", num: 2, name: "Security", desc: "Audit 4 vulnerabilities" },
    { id: "demo-3-tests", num: 3, name: "Tests", desc: "Generate unit tests" },
    { id: "demo-4-feature", num: 4, name: "Feature", desc: "Implement search function" },
  ];

  // ─── Render ─────────────────────────────────────────────────
  function render() {
    if (state === "auth") renderAuth();
    else if (state === "loading") renderLoading();
    else if (state === "queue") renderQueue();
    else if (state === "terminal") renderTerminal();
    else if (state === "ended") renderEnded();
  }

  function renderAuth() {
    app.innerHTML = `
      <div class="auth-screen">
        <div class="auth-title">Try Selfware</div>
        <div class="auth-sub">
          Get an instant terminal with selfware pre-configured.
          Choose from 4 demos: fix bugs, audit security, generate tests, or build a feature.
        </div>
        <form class="auth-form" id="auth-form">
          <input type="email" id="email-input" placeholder="your@email.com" required autocomplete="email" />
          <button type="submit" id="start-btn">START</button>
        </form>
        <div class="auth-error" id="auth-error"></div>
        <div class="auth-note">
          Session lasts 15 min. No signup required.<br>
          Your email is only used for rate limiting.
        </div>
        <div class="showcase">
          <div class="showcase-title">WHAT YOU CAN TRY</div>
          <div class="showcase-cards">
            <div class="showcase-card">
              <div class="sc-icon">🐛</div>
              <div class="sc-label">Bug Fixing</div>
              <div class="sc-desc">Watch selfware find and fix 3 bugs in a weather CLI, then verify with tests.</div>
            </div>
            <div class="showcase-card">
              <div class="sc-icon">🔒</div>
              <div class="sc-label">Security Audit</div>
              <div class="sc-desc">Selfware identifies hardcoded secrets, path traversal, and unsafe memory access.</div>
            </div>
            <div class="showcase-card">
              <div class="sc-icon">🧪</div>
              <div class="sc-label">Test Generation</div>
              <div class="sc-desc">Generate comprehensive tests with edge cases for 5 string utility functions.</div>
            </div>
            <div class="showcase-card">
              <div class="sc-icon">🔧</div>
              <div class="sc-label">Build a Feature</div>
              <div class="sc-desc">Implement a search function from a README spec in a mini-grep CLI.</div>
            </div>
          </div>
        </div>
      </div>`;
    $("auth-form").addEventListener("submit", handleStart);
    $("email-input").focus();
    statusBar.innerHTML = '<span class="status-dot green"></span> Ready';
  }

  function renderLoading() {
    app.innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <div class="loading-text">Starting your container...</div>
      </div>`;
    statusBar.innerHTML = '<span class="status-dot yellow"></span> Starting';
  }

  function renderQueue() {
    // position set externally
  }

  function showQueue(position) {
    state = "queue";
    app.innerHTML = `
      <div class="queue-screen">
        <div class="queue-pos">#${position}</div>
        <div class="queue-label">IN QUEUE</div>
        <div class="queue-info">All containers are in use. You'll be connected when a slot opens.</div>
      </div>`;
    statusBar.innerHTML = '<span class="status-dot yellow"></span> Queued';
  }

  function renderTerminal() {
    app.innerHTML = `
      <div class="workspace" id="workspace">
        <div class="terminal-pane" id="terminal-container"></div>
        <div class="visual-panel" id="visual-panel">
          <div class="panel-section">
            <div class="panel-section-title">Activity</div>
            <div class="activity-feed" id="activity-feed"></div>
          </div>
          <div class="panel-section">
            <div class="panel-section-title">Screenshots</div>
            <div class="gallery" id="gallery"></div>
          </div>
          <div class="panel-section">
            <div class="panel-section-title">Stats</div>
            <div class="stats-grid" id="stats-grid">
              <div class="stat-item"><div class="stat-val" id="stat-steps">0</div><div class="stat-label">STEPS</div></div>
              <div class="stat-item"><div class="stat-val" id="stat-files">0</div><div class="stat-label">FILES</div></div>
              <div class="stat-item"><div class="stat-val" id="stat-tests">0</div><div class="stat-label">TESTS</div></div>
              <div class="stat-item"><div class="stat-val" id="stat-time">0:00</div><div class="stat-label">ELAPSED</div></div>
            </div>
          </div>
        </div>
      </div>
      <div class="demo-tabs" id="demo-tabs"></div>`;

    statusBar.innerHTML = '<span class="status-dot green"></span> Connected';

    // Render demo tabs
    renderDemoTabs();

    // Init xterm
    term = new Terminal({
      fontFamily: "'DM Mono', 'Menlo', 'DejaVu Sans Mono', monospace",
      fontSize: 14,
      lineHeight: 1.3,
      cursorBlink: true,
      cursorStyle: "bar",
      theme: {
        background: "#0c0f08",
        foreground: "#e8e0d0",
        cursor: "#D4A373",
        cursorAccent: "#0c0f08",
        selectionBackground: "rgba(212,163,115,0.3)",
        black: "#1a1d14",
        red: "#c44",
        green: "#606C38",
        yellow: "#D4A373",
        blue: "#5a7a9a",
        magenta: "#9a6a8a",
        cyan: "#5a8a7a",
        white: "#e8e0d0",
        brightBlack: "#4a4d3a",
        brightRed: "#e66",
        brightGreen: "#7a8a4a",
        brightYellow: "#e8c090",
        brightBlue: "#7a9aba",
        brightMagenta: "#ba8aaa",
        brightCyan: "#7aaaa0",
        brightWhite: "#fefae0",
      },
    });

    fitAddon = new FitAddon.FitAddon();
    const webLinksAddon = new WebLinksAddon.WebLinksAddon();
    term.loadAddon(fitAddon);
    term.loadAddon(webLinksAddon);

    const container = $("terminal-container");
    term.open(container);
    fitAddon.fit();

    // Send initial size
    sendMsg({ type: "resize", cols: term.cols, rows: term.rows });

    term.onData((data) => {
      sendMsg({ type: "input", data });
    });

    term.onResize(({ cols, rows }) => {
      sendMsg({ type: "resize", cols, rows });
    });

    window.addEventListener("resize", handleResize);

    // Start countdown
    sessionStart = Date.now();
    timerInterval = setInterval(updateTimer, 1000);
    updateTimer();

    term.focus();
  }

  function handleResize() {
    if (fitAddon) fitAddon.fit();
  }

  function renderDemoTabs() {
    const tabsEl = $("demo-tabs");
    if (!tabsEl) return;
    tabsEl.innerHTML = DEMOS.map(d => `
      <div class="demo-tab${d.id === activeDemo ? ' active' : ''}" data-demo="${d.id}">
        <span class="dt-num">${d.num}</span> ${d.name}
      </div>
    `).join("");
    tabsEl.querySelectorAll(".demo-tab").forEach(tab => {
      tab.addEventListener("click", () => {
        const demo = tab.dataset.demo;
        activeDemo = demo;
        renderDemoTabs();
        sendMsg({ type: "demo-select", demo });
      });
    });
  }

  function renderEnded(reason) {
    if (timerInterval) clearInterval(timerInterval);
    window.removeEventListener("resize", handleResize);
    timerEl.textContent = "";
    statusBar.innerHTML = '<span class="status-dot red"></span> Ended';

    const overlay = document.createElement("div");
    overlay.className = "ended-overlay";
    overlay.innerHTML = `
      <h2>Session Ended</h2>
      <p>${reason || "Your trial session has ended."}</p>
      <a href="/">Back to selfware.design</a>
      <br><br>
      <a href="/try" style="border:none;font-size:11px;color:#908878">Start a new session</a>`;
    document.body.appendChild(overlay);
  }

  // ─── Timer ──────────────────────────────────────────────────
  function updateTimer() {
    if (!sessionStart) return;
    const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
    const remaining = Math.max(0, SESSION_MAX - elapsed);
    const min = Math.floor(remaining / 60);
    const sec = remaining % 60;
    timerEl.textContent = `${min}:${String(sec).padStart(2, "0")}`;
    if (remaining <= 60) timerEl.style.color = "#c44";

    // Update elapsed stat
    const elapsedStat = $("stat-time");
    if (elapsedStat) {
      const em = Math.floor(elapsed / 60);
      const es = elapsed % 60;
      elapsedStat.textContent = `${em}:${String(es).padStart(2, "0")}`;
    }
  }

  // ─── Activity Feed Parser ─────────────────────────────────
  // Buffer for accumulating terminal output text (stripped of ANSI)
  let outputBuffer = "";

  function stripAnsi(str) {
    return str.replace(/\x1b\[[0-9;]*[a-zA-Z]/g, "").replace(/\x1b\][^\x07]*\x07/g, "");
  }

  function parseActivityFromOutput(raw) {
    const text = stripAnsi(raw);
    outputBuffer += text;

    // Process complete lines
    const lines = outputBuffer.split("\n");
    // Keep the last incomplete line in the buffer
    outputBuffer = lines.pop() || "";

    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed) continue;

      // Step markers
      if (/📝\s*Step\s+(\d+)/i.test(trimmed)) {
        const m = trimmed.match(/📝\s*Step\s+(\d+)/i);
        stepCount = parseInt(m[1], 10);
        addActivity("info", "⟳", `Step ${stepCount} executing...`);
        updateStats();
        captureScreenshot();
      }
      // Read file
      else if (/✔\s*Read\s+(.+)/i.test(trimmed)) {
        const m = trimmed.match(/✔\s*Read\s+(.+)/i);
        addActivity("success", "✔", `Read ${m[1].trim()}`);
      }
      // Edited file
      else if (/✔\s*Edit(?:ed)?\s+(.+)/i.test(trimmed)) {
        const m = trimmed.match(/✔\s*Edit(?:ed)?\s+(.+)/i);
        addActivity("success", "✎", `Edited ${m[1].trim()}`);
        filesChanged++;
        updateStats();
      }
      // Wrote file
      else if (/✔\s*Wro?te?\s+(.+)/i.test(trimmed)) {
        const m = trimmed.match(/✔\s*Wro?te?\s+(.+)/i);
        addActivity("success", "✎", `Wrote ${m[1].trim()}`);
        filesChanged++;
        updateStats();
      }
      // Tests passed
      else if (/test result:.*(\d+)\s+passed/i.test(trimmed)) {
        const m = trimmed.match(/(\d+)\s+passed/i);
        testsPassed = parseInt(m[1], 10);
        addActivity("success", "✔", `Tests: ${testsPassed} passed`);
        updateStats();
        captureScreenshot();
      }
      // Verification
      else if (/✔\s*Verification/i.test(trimmed)) {
        addActivity("success", "✔", "Verification passed");
        captureScreenshot();
      }
      else if (/✕\s*Verification/i.test(trimmed)) {
        addActivity("error", "✕", "Verification failed");
        captureScreenshot();
      }
      // Thinking
      else if (/^Thinking:/i.test(trimmed)) {
        const thought = trimmed.slice(9).trim().slice(0, 60);
        addActivity("thinking", "🧠", thought || "...");
      }
      // Bash / command execution
      else if (/✔\s*Bash\s*\(/i.test(trimmed) || /✔\s*Ran\s+/i.test(trimmed)) {
        addActivity("success", "▶", trimmed.slice(0, 60));
      }
      // Found bugs/issues
      else if (/found\s+(\d+)\s+(bug|issue|vulnerabilit)/i.test(trimmed)) {
        const m = trimmed.match(/found\s+(\d+)\s+(bug|issue|vulnerabilit\w*)/i);
        addActivity("info", "🔍", `Found ${m[1]} ${m[2]}${parseInt(m[1]) > 1 ? "s" : ""}`);
      }
      // Fixed
      else if (/✔\s*Fixed/i.test(trimmed)) {
        addActivity("success", "✔", trimmed.slice(0, 60));
      }
    }
  }

  function addActivity(type, icon, text) {
    activityItems.push({ type, icon, text });
    // Keep max 50 items
    if (activityItems.length > 50) activityItems.shift();
    renderActivityFeed();
  }

  function renderActivityFeed() {
    const feed = $("activity-feed");
    if (!feed) return;
    // Only render last 20 for performance
    const items = activityItems.slice(-20);
    feed.innerHTML = items.map(item =>
      `<div class="activity-item ${item.type}"><span class="ai-icon">${item.icon}</span><span class="ai-text">${escHtml(item.text)}</span></div>`
    ).join("");
    feed.scrollTop = feed.scrollHeight;
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function updateStats() {
    const s = $("stat-steps");
    const f = $("stat-files");
    const t = $("stat-tests");
    if (s) s.textContent = stepCount;
    if (f) f.textContent = filesChanged;
    if (t) t.textContent = testsPassed;
  }

  // ─── Screenshot Auto-Capture ──────────────────────────────
  function captureScreenshot() {
    if (!term) return;
    // xterm.js renders to canvas elements inside the terminal container
    const container = $("terminal-container");
    if (!container) return;
    const canvas = container.querySelector("canvas");
    if (!canvas) return;

    try {
      const dataUrl = canvas.toDataURL("image/png");
      screenshots.push(dataUrl);
      // Keep max 12 screenshots
      if (screenshots.length > 12) screenshots.shift();
      renderGallery();
    } catch (e) {
      // Canvas may be tainted or unavailable
    }
  }

  function renderGallery() {
    const gallery = $("gallery");
    if (!gallery) return;
    gallery.innerHTML = screenshots.map((src, i) =>
      `<img class="gallery-thumb" src="${src}" alt="Screenshot ${i + 1}" data-idx="${i}" />`
    ).join("");
    gallery.querySelectorAll(".gallery-thumb").forEach(img => {
      img.addEventListener("click", () => showLightbox(img.src));
    });
  }

  function showLightbox(src) {
    const lb = document.createElement("div");
    lb.className = "lightbox";
    lb.innerHTML = `<img src="${src}" alt="Screenshot" />`;
    lb.addEventListener("click", () => lb.remove());
    document.addEventListener("keydown", function handler(e) {
      if (e.key === "Escape") { lb.remove(); document.removeEventListener("keydown", handler); }
    });
    document.body.appendChild(lb);
  }

  // ─── Auth ───────────────────────────────────────────────────
  async function handleStart(e) {
    e.preventDefault();
    const email = $("email-input").value.trim();
    const errEl = $("auth-error");
    const btn = $("start-btn");

    if (!email) { errEl.textContent = "Email required"; return; }

    btn.disabled = true;
    btn.textContent = "STARTING...";
    errEl.textContent = "";

    try {
      const res = await fetch("/api/trial/start", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email }),
      });
      const data = await res.json();
      if (!res.ok) {
        errEl.textContent = data.error || "Failed to start session";
        btn.disabled = false;
        btn.textContent = "START";
        return;
      }

      token = data.token;

      if (data.queued) {
        showQueue(data.position);
        connectWS();
      } else {
        state = "loading";
        render();
        connectWS();
      }
    } catch (err) {
      errEl.textContent = "Network error. Please try again.";
      btn.disabled = false;
      btn.textContent = "START";
    }
  }

  // ─── WebSocket ──────────────────────────────────────────────
  function connectWS() {
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    ws = new WebSocket(`${proto}//${location.host}/ws/terminal`);

    ws.onopen = () => {
      sendMsg({ type: "auth", token });
    };

    ws.onmessage = (event) => {
      let msg;
      try { msg = JSON.parse(event.data); } catch { return; }

      switch (msg.type) {
        case "ready":
          if (state !== "terminal") {
            state = "terminal";
            render();
          }
          break;

        case "output":
          if (term) {
            term.write(msg.data);
            // Parse for activity feed
            parseActivityFromOutput(msg.data);
          }
          break;

        case "queue":
          showQueue(msg.position);
          break;

        case "warning":
          if (term) {
            term.write(`\r\n\x1b[33m⚠ ${msg.message}\x1b[0m\r\n`);
          }
          break;

        case "terminated":
          state = "ended";
          renderEnded(msg.reason);
          break;
      }
    };

    ws.onclose = () => {
      if (state !== "ended") {
        state = "ended";
        renderEnded("Connection lost");
      }
    };

    ws.onerror = () => {};
  }

  function sendMsg(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(obj));
    }
  }

  // ─── Init ───────────────────────────────────────────────────
  render();
})();
</script>
</body>
</html>
