<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0f08"/>
      <stop offset="100%" stop-color="#141a0e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#D4A373">
    <line x1="0" y1="157" x2="1200" y2="157" stroke-width="0.5"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke-width="0.5"/>
    <line x1="0" y1="473" x2="1200" y2="473" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke-width="0.5"/>
  </g>
  <!-- Accent border -->
  <rect x="40" y="40" width="1120" height="550" rx="16" fill="none" stroke="#D4A373" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Fox icon -->
  <text x="80" y="120" font-size="42">🦊</text>
  <!-- Brand -->
  <text x="130" y="115" font-family="monospace" font-size="18" fill="#D4A373" letter-spacing="4" font-weight="500">SELFWARE</text>
  <!-- Main title -->
  <text x="80" y="250" font-family="Georgia, serif" font-size="72" fill="#D4A373" font-weight="400">self</text>
  <text x="265" y="250" font-family="Georgia, serif" font-size="72" fill="#e8e0d0" font-weight="400">ware</text>
  <!-- Subtitle -->
  <text x="80" y="310" font-family="Georgia, serif" font-size="26" fill="#a09880" font-style="italic">Software that improves itself. Locally run. Privately owned.</text>
  <!-- Stats bar -->
  <g transform="translate(80, 380)">
    <rect width="180" height="70" rx="8" fill="#0c0f08" stroke="#D4A373" stroke-opacity="0.12"/>
    <text x="90" y="30" font-family="Georgia, serif" font-size="28" fill="#D4A373" text-anchor="middle">53</text>
    <text x="90" y="52" font-family="monospace" font-size="11" fill="#888" text-anchor="middle" letter-spacing="1">TOOLS</text>
  </g>
  <g transform="translate(280, 380)">
    <rect width="180" height="70" rx="8" fill="#0c0f08" stroke="#606C38" stroke-opacity="0.12"/>
    <text x="90" y="30" font-family="Georgia, serif" font-size="28" fill="#606C38" text-anchor="middle">16</text>
    <text x="90" y="52" font-family="monospace" font-size="11" fill="#888" text-anchor="middle" letter-spacing="1">AGENTS</text>
  </g>
  <g transform="translate(480, 380)">
    <rect width="180" height="70" rx="8" fill="#0c0f08" stroke="#BC6C25" stroke-opacity="0.12"/>
    <text x="90" y="30" font-family="Georgia, serif" font-size="28" fill="#BC6C25" text-anchor="middle">89/100</text>
    <text x="90" y="52" font-family="monospace" font-size="11" fill="#888" text-anchor="middle" letter-spacing="1">SAB SCORE</text>
  </g>
  <g transform="translate(680, 380)">
    <rect width="180" height="70" rx="8" fill="#0c0f08" stroke="#D4A373" stroke-opacity="0.12"/>
    <text x="90" y="30" font-family="Georgia, serif" font-size="28" fill="#D4A373" text-anchor="middle">6800+</text>
    <text x="90" y="52" font-family="monospace" font-size="11" fill="#888" text-anchor="middle" letter-spacing="1">TESTS</text>
  </g>
  <g transform="translate(880, 380)">
    <rect width="180" height="70" rx="8" fill="#0c0f08" stroke="#8B7355" stroke-opacity="0.12"/>
    <text x="90" y="30" font-family="Georgia, serif" font-size="28" fill="#8B7355" text-anchor="middle">519+</text>
    <text x="90" y="52" font-family="monospace" font-size="11" fill="#888" text-anchor="middle" letter-spacing="1">COMMITS</text>
  </g>
  <!-- Tagline bottom -->
  <text x="80" y="530" font-family="monospace" font-size="13" fill="#666" letter-spacing="2">YOUR HARDWARE · YOUR DATA · YOUR LOOP</text>
  <!-- URL -->
  <text x="1120" y="530" font-family="monospace" font-size="13" fill="#D4A373" text-anchor="end" letter-spacing="1">selfware.design</text>
  <!-- Decorative particles -->
  <circle cx="950" cy="120" r="2" fill="#D4A373" opacity="0.3"/>
  <circle cx="1020" cy="180" r="1.5" fill="#D4A373" opacity="0.2"/>
  <circle cx="980" cy="250" r="2.5" fill="#606C38" opacity="0.25"/>
  <circle cx="1060" cy="150" r="1" fill="#D4A373" opacity="0.35"/>
  <circle cx="1100" cy="220" r="2" fill="#BC6C25" opacity="0.2"/>
  <circle cx="920" cy="200" r="1.5" fill="#D4A373" opacity="0.15"/>
  <circle cx="1050" cy="280" r="1" fill="#606C38" opacity="0.3"/>
  <circle cx="970" cy="300" r="2" fill="#D4A373" opacity="0.2"/>
</svg>
