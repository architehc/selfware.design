<script>
const e=React.createElement,{useState,useEffect,useRef,useCallback,Fragment}=React;

// ─── Particle System ─────────────────────────────────────────────
function useParticles(canvasRef,phase){
  const anim=useRef(null),ps=useRef([]),t=useRef(0),visible=useRef(true);
  useEffect(()=>{
    const c=canvasRef.current;if(!c)return;
    const ctx=c.getContext("2d"),N=80;
    const resize=()=>{const d=Math.min(devicePixelRatio||1,2);c.width=c.offsetWidth*d;c.height=c.offsetHeight*d;ctx.setTransform(d,0,0,d,0,0)};
    resize();window.addEventListener("resize",resize);
    const obs=new IntersectionObserver(([entry])=>{visible.current=entry.isIntersecting;if(entry.isIntersecting&&!anim.current)anim.current=requestAnimationFrame(draw)},{threshold:0.05});
    obs.observe(c);
    ps.current=Array.from({length:N},()=>({x:Math.random()*c.offsetWidth,y:Math.random()*c.offsetHeight,vx:(Math.random()-.5)*1.2,vy:(Math.random()-.5)*1.2,sz:Math.random()*2+1,h:28+Math.random()*16,s:Math.random()}));
    const draw=()=>{
      if(!visible.current){anim.current=null;return}
      const W=c.offsetWidth,H=c.offsetHeight;t.current+=.007;const T=t.current;
      ctx.clearRect(0,0,W,H);const P=ps.current;
      P.forEach(p=>{
        if(phase===0){p.vx*=.96;p.vy*=.96}
        else if(phase===1){p.vx=Math.sin(T*2+p.s*6.28)*.7;p.vy=Math.cos(T*2+p.s*6.28)*.7}
        else if(phase===2){p.vx+=(Math.random()-.5)*.5;p.vy+=(Math.random()-.5)*.5;p.vx*=.94;p.vy*=.94}
        else{
          let cx=0,cy=0,n=0;
          P.forEach(q=>{const dx=q.x-p.x,dy=q.y-p.y,d=Math.sqrt(dx*dx+dy*dy);if(d>0&&d<75){cx+=q.x;cy+=q.y;n++;if(d<22){p.vx-=dx*.012;p.vy-=dy*.012}}});
          if(n>0){cx/=n;cy/=n;p.vx+=(cx-p.x)*.0008;p.vy+=(cy-p.y)*.0008}
          const mx=W/2+Math.sin(T*.25)*W*.15,my=H/2+Math.cos(T*.18)*H*.12,dx=mx-p.x,dy=my-p.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
          p.vx+=(-dy/dist)*.035+dx*.00008;p.vy+=(dx/dist)*.035+dy*.00008;p.vx*=.98;p.vy*=.98;
        }
        p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      });
      if(phase>=3){for(let i=0;i<P.length;i++)for(let j=i+1;j<P.length;j++){const dx=P[j].x-P[i].x,dy=P[j].y-P[i].y,d=Math.sqrt(dx*dx+dy*dy);if(d<65){ctx.strokeStyle=`hsla(33,60%,58%,${(1-d/65)*.22})`;ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(P[i].x,P[i].y);ctx.lineTo(P[j].x,P[j].y);ctx.stroke()}}}
      P.forEach(p=>{const g=phase>=3?.75:.35+Math.sin(T*3+p.s*10)*.2;ctx.fillStyle=`hsla(${p.h},60%,62%,${g})`;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*(phase>=3?1.4:1),0,Math.PI*2);ctx.fill()});
      anim.current=requestAnimationFrame(draw);
    };
    draw();
    return()=>{cancelAnimationFrame(anim.current);anim.current=null;window.removeEventListener("resize",resize);obs.disconnect()};
  },[canvasRef,phase]);
}

// ─── Game of Life ────────────────────────────────────────────────
function GoL({w:W,h:H,mobile:isMobile}){
  const ref=useRef(),grid=useRef(),CELL=6;
  const init=useCallback(()=>Array.from({length:H},()=>Array.from({length:W},()=>Math.random()<.28?1:0)),[W,H]);
  useEffect(()=>{
    const c=ref.current;if(!c)return;const ctx=c.getContext("2d");c.width=W*CELL;c.height=H*CELL;grid.current=init();let last=0,id;
    const step=()=>{const g=grid.current;grid.current=g.map((row,y)=>row.map((_,x)=>{let n=0;for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){if(!dx&&!dy)continue;const ny=y+dy,nx=x+dx;if(ny>=0&&ny<H&&nx>=0&&nx<W)n+=g[ny][nx]?1:0}return g[y][x]?(n===2||n===3?2:0):(n===3?1:0)}))};
    const draw=ts=>{if(ts-last>120){step();last=ts}ctx.fillStyle="#0c0f08";ctx.fillRect(0,0,c.width,c.height);const g=grid.current;for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(g[y][x]){ctx.fillStyle=g[y][x]>1?"#D4A373":"#606C38";ctx.fillRect(x*CELL+1,y*CELL+1,CELL-2,CELL-2)}id=requestAnimationFrame(draw)};
    id=requestAnimationFrame(draw);return()=>cancelAnimationFrame(id);
  },[W,H,init]);
  return e("div",{style:{position:"relative"}},
    e("canvas",{ref,role:"img","aria-label":"Conway's Game of Life cellular automaton simulation",style:{width:"100%",height:"auto",borderRadius:8,display:"block",imageRendering:"pixelated"}}),
    e("button",{onClick:()=>{grid.current=init()},style:{position:"absolute",bottom:8,right:8,background:"rgba(212,163,115,0.15)",border:"1px solid rgba(212,163,115,0.25)",color:"#D4A373",padding:isMobile?"8px 14px":"6px 14px",borderRadius:7,fontFamily:"'DM Mono',monospace",fontSize:isMobile?12:11,cursor:"pointer",minHeight:isMobile?36:"auto"}},"reseed")
  );
}

// ─── Scroll Visibility ───────────────────────────────────────────
function useVis(ref,th){
  const[v,set]=useState(false);
  useEffect(()=>{const el=ref.current;if(!el)return;const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)set(true)},{threshold:th||.12});o.observe(el);return()=>o.disconnect()},[ref,th]);
  return v;
}

function Fade({children,delay,style,nav}){
  const ref=useRef(),vis=useVis(ref,.1);
  return e("div",{ref,"data-nav":nav||undefined,style:{opacity:vis?1:0,transform:vis?"translateY(0)":"translateY(32px)",transition:`opacity 0.7s ease ${delay||0}s, transform 0.7s ease ${delay||0}s`,...(style||{})}},children);
}

function LazySection({children,height}){
  const ref=useRef(),[load,setLoad]=useState(false);
  useEffect(()=>{const el=ref.current;if(!el)return;const o=new IntersectionObserver(([e])=>{if(e.isIntersecting){setLoad(true);o.disconnect()}},{rootMargin:"200px"});o.observe(el);return()=>o.disconnect()},[]);
  return e("div",{ref,style:{minHeight:load?undefined:(height||200)}},load?children:null);
}

// ─── Animated Number ─────────────────────────────────────────────
function Num({target:T,suffix:S,active:A}){
  const[v,set]=useState(0);
  useEffect(()=>{if(!A)return;let f;const s=performance.now(),tick=n=>{const t=Math.min((n-s)/2000,1);set(Math.round(T*(1-Math.pow(1-t,4))));if(t<1)f=requestAnimationFrame(tick)};f=requestAnimationFrame(tick);return()=>cancelAnimationFrame(f)},[T,A]);
  return e("span",null,v,S||"");
}

// ─── Terminal Demo ───────────────────────────────────────────────
const TERM_LINES=[
  {t:"cmd",v:"$ selfware analyze ./massive_game_server",d:40},
  {t:"out",v:"🔍 Scanning 133 Rust files (42,596 lines)...",d:800},
  {t:"warn",v:"⚠  Found 3 critical issues:",d:600},
  {t:"sub",v:"   1. Delta bitmask truncation → silent data loss",d:200},
  {t:"sub",v:"   2. ObjectPool race condition → memory exhaustion",d:200},
  {t:"sub",v:"   3. SMS command injection → RCE vulnerability",d:200},
  {t:"out",v:"📊 Doc coverage: 0.8% — needs 20%+",d:400},
  {t:"gap"},
  {t:"cmd",v:'$ selfware run "fix critical bugs, add tests"',d:40},
  {t:"agent",v:"🏗️ Architect → planning fix across 18 modules",d:500,c:"#D4A373"},
  {t:"agent",v:"💻 Coder → patching delta bitmask (u16 not u8)",d:400,c:"#606C38"},
  {t:"agent",v:"🧪 Tester → generating 47 regression tests",d:400,c:"#BC6C25"},
  {t:"agent",v:"🔍 Reviewer → verifying thread safety",d:300,c:"#8B7355"},
  {t:"agent",v:"🔒 Security → sanitizing shell construction",d:300,c:"#C75B3A"},
  {t:"bloom",v:"🌸 BLOOM — all 3 critical bugs fixed. 47 tests pass.",d:600},
  {t:"gap"},
  {t:"cmd",v:"$ selfware garden",d:40},
  {t:"tree",v:"🌱 massive_game_server",d:200},
  {t:"tree",v:"├── 🌸 core/          BLOOM  (healthy)",d:150},
  {t:"tree",v:"├── 🌿 network/       GROW   (improving)",d:150},
  {t:"tree",v:"├── 🌾 state_sync/    WILT   (needs care)",d:150},
  {t:"tree",v:"└── ❄️ auth/          FROST  (critical)",d:150},
];
function TerminalDemo({mobile}){
  const ref=useRef(),vis=useVis(ref,.2);
  const[lines,setLines]=useState([]);
  const started=useRef(false);
  useEffect(()=>{
    if(!vis||started.current)return;started.current=true;
    let i=0,timeout;
    const next=()=>{
      if(i>=TERM_LINES.length)return;
      const line=TERM_LINES[i];i++;
      if(line.t==="gap"){setLines(p=>[...p,line]);timeout=setTimeout(next,400);return}
      setLines(p=>[...p,line]);
      timeout=setTimeout(next,line.d||200);
    };
    timeout=setTimeout(next,600);
    return()=>clearTimeout(timeout);
  },[vis]);
  const lnStyle=(l)=>{
    const base={fontFamily:M,fontSize:mobile?11:13,lineHeight:1.7,whiteSpace:"pre-wrap",wordBreak:"break-word"};
    if(l.t==="cmd")return{...base,color:"#e8e0d0"};
    if(l.t==="warn")return{...base,color:"#C75B3A"};
    if(l.t==="sub")return{...base,color:"#b0a590"};
    if(l.t==="agent")return{...base,color:l.c||"#888"};
    if(l.t==="bloom")return{...base,color:"#606C38",fontWeight:500};
    if(l.t==="tree")return{...base,color:"#a09880",fontSize:mobile?10:12};
    if(l.t==="gap")return{height:12};
    return{...base,color:"#a09880"};
  };
  return e("div",{ref,style:{background:"rgba(0,0,0,0.45)",border:"1px solid rgba(212,163,115,0.1)",borderRadius:mobile?10:14,padding:mobile?"16px 14px":"24px 28px",maxWidth:700,margin:"0 auto",minHeight:mobile?200:280,maxHeight:mobile?360:420,overflow:"auto"}},
    e("div",{style:{display:"flex",gap:6,marginBottom:mobile?12:16}},
      ...[["#C75B3A","8"],["#D4A373","8"],["#606C38","8"]].map(([c,s],i)=>e("div",{key:i,style:{width:s+"px",height:s+"px",borderRadius:"50%",background:c,opacity:.6}}))
    ),
    ...lines.map((l,i)=>e("div",{key:i,style:{...lnStyle(l),animation:"fadeUp 0.3s ease both"}},(l.t!=="gap")?l.v:null))
  );
}

// ─── Agent Swarm Viz ─────────────────────────────────────────────
const AGENTS=[
  {role:"Architect",icon:"🏗️",desc:"Module design, refactoring, dependency mapping. Plans the structure before anyone writes a line.",color:"#D4A373"},
  {role:"Coder",icon:"💻",desc:"Implementation and feature development. Writes the code that passes the Tester's scrutiny.",color:"#606C38"},
  {role:"Tester",icon:"🧪",desc:"Test generation, verification gates. Every mutation must survive the test suite.",color:"#BC6C25"},
  {role:"Reviewer",icon:"🔍",desc:"Code review, quality checks. Catches what the Coder missed and the Tester didn't cover.",color:"#8B7355"},
  {role:"DevOps",icon:"⚙️",desc:"Build pipelines, deployment, infrastructure. Keeps the workshop running.",color:"#7a8a5a"},
  {role:"Security",icon:"🔒",desc:"Vulnerability scanning, safety audits. Guards the protected groves.",color:"#C75B3A"},
];
function SwarmViz({mobile}){
  const[active,setActive]=useState(0);
  const[pulse,setPulse]=useState(-1);
  useEffect(()=>{
    const iv=setInterval(()=>setPulse(p=>(p+1)%6),2000);
    return()=>clearInterval(iv);
  },[]);
  const ag=AGENTS[active];
  return e("div",null,
    e("div",{style:{display:"grid",gridTemplateColumns:mobile?"repeat(3,1fr)":"repeat(6,1fr)",gap:mobile?8:12,marginBottom:mobile?20:28}},
      ...AGENTS.map((a,i)=>e("button",{key:i,onClick:()=>setActive(i),style:{background:active===i?"rgba(212,163,115,0.1)":"rgba(0,0,0,0.2)",border:active===i?"1px solid "+a.color+"44":"1px solid rgba(212,163,115,0.06)",borderRadius:10,padding:mobile?"12px 6px":"16px 10px",cursor:"pointer",textAlign:"center",transition:"all 0.3s",transform:pulse===i?"scale(1.05)":"scale(1)"}},
        e("div",{style:{fontSize:mobile?20:26,marginBottom:4,filter:pulse===i?"brightness(1.3)":"none",transition:"filter 0.3s"}},a.icon),
        e("div",{style:{fontFamily:M,fontSize:mobile?9:10,color:active===i?a.color:"#777",letterSpacing:"0.04em"}},a.role)
      ))
    ),
    e("div",{style:{background:"rgba(0,0,0,0.25)",border:"1px solid "+ag.color+"22",borderRadius:10,padding:mobile?16:22,minHeight:mobile?60:70,transition:"border-color 0.3s"}},
      e("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:8}},
        e("span",{style:{fontSize:18}},ag.icon),
        e("span",{style:{fontFamily:M,fontSize:mobile?12:13,color:ag.color,fontWeight:500}},ag.role)
      ),
      e("p",{style:{fontFamily:"'Newsreader',serif",fontSize:mobile?13:14,color:"#a09880",lineHeight:1.6,fontStyle:"italic"}},ag.desc)

}

function ScoreBar({label,score,color,active,mobile}){
  const[val,setVal]=useState(0);
  useEffect(()=>{if(!active)return;const t=setTimeout(()=>setVal(score),200);return()=>clearTimeout(t)},[score,active]);
  return e("div",{style:{marginBottom:mobile?8:10}},
    e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
      e("span",{style:{fontFamily:M,fontSize:mobile?10:11,color:"#a09880"}},label),
      e("span",{style:{fontFamily:M,fontSize:mobile?10:11,color:color}},val+"/100")
    ),
    e("div",{style:{height:4,borderRadius:2,background:"rgba(212,163,115,0.08)",overflow:"hidden"}},
      e("div",{style:{height:"100%",width:val+"%",background:color,borderRadius:2,transition:"width 1.2s cubic-bezier(0.4,0,0.2,1)"}})

// ─── Navigation Dots ────────────────────────────────────────────
function NavDots({mobile}){
  if(mobile)return null;
  const[items,setItems]=useState([]);
  const[active,setActive]=useState(0);

function EmailForm({mobile}){
  const[email,setEmail]=useState("");
  const[state,setState]=useState("idle"); // idle | sending | done | error
  const[msg,setMsg]=useState("");
  const submit=()=>{
    if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))return setState("error")||setMsg("Enter a valid email");
    setState("sending");
    fetch("/api/subscribe",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email})})
      .then(r=>r.json())
      .then(d=>{setState("done");setMsg(d.msg||"Subscribed!");setEmail("")})
      .catch(()=>{setState("error");setMsg("Something went wrong")});
  };
  if(state==="done")return e("div",{style:{fontFamily:M,fontSize:mobile?11:12,color:G,textAlign:"center",padding:"12px 0"}},"✓ "+msg);
  return e("div",{style:{display:"flex",gap:8,maxWidth:420,margin:"0 auto",flexWrap:"wrap",justifyContent:"center"}},
    e("input",{type:"email",value:email,onChange:ev=>setEmail(ev.target.value),onKeyDown:ev=>{if(ev.key==="Enter")submit()},placeholder:"your@email.com","aria-label":"Email address",style:{flex:"1 1 220px",fontFamily:M,fontSize:mobile?12:13,padding:mobile?"10px 14px":"11px 16px",background:"rgba(0,0,0,0.35)",border:state==="error"?"1px solid rgba(199,91,58,0.4)":"1px solid rgba(212,163,115,0.15)",borderRadius:8,color:"#e8e0d0",outline:"none",minWidth:0}}),
    e("button",{onClick:submit,disabled:state==="sending",style:{fontFamily:M,fontSize:mobile?11:12,padding:mobile?"10px 18px":"11px 22px",background:"rgba(212,163,115,0.12)",border:"1px solid rgba(212,163,115,0.28)",borderRadius:8,color:A,cursor:"pointer",letterSpacing:"0.04em",whiteSpace:"nowrap",opacity:state==="sending"?.6:1}},state==="sending"?"...":"Notify me"),
    state==="error"&&e("div",{style:{width:"100%",fontFamily:M,fontSize:10,color:"#C75B3A",textAlign:"center",marginTop:2}},msg)
  );
}
